<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>数字树洞 · 用户端</title>
  <link rel="stylesheet" href="./vendor/element-plus.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div id="app">
    <el-container class="layout">
      <el-header class="header">
        <div class="brand">
          <div class="brand-dot"></div>
          <span>数字树洞</span>
          <small v-if="visitor.visitorCode">访客 {{ visitor.visitorCode.slice(0, 8) }}</small>
        </div>
        <el-menu
          mode="horizontal"
          :default-active="route"
          @select="onMenu"
          :ellipsis="false"
          class="nav-menu"
        >
          <el-menu-item index="home">首页</el-menu-item>
          <el-menu-item index="chat">树洞聊天</el-menu-item>
          <el-menu-item index="doodle">心情涂鸦</el-menu-item>
          <el-menu-item index="starmap">情感星空图</el-menu-item>
        </el-menu>
      </el-header>
      <el-main>
        <home-page v-if="route === 'home'" @go="onMenu"></home-page>
        <chat-page v-else-if="route === 'chat'"></chat-page>
        <doodle-page v-else-if="route === 'doodle'"></doodle-page>
        <star-map-page v-else-if="route === 'starmap'"></star-map-page>
      </el-main>
      <el-footer class="footer">
        <span>© 2026 福州大学 · 数字树洞校赛项目 · Demo</span>
      </el-footer>
    </el-container>
  </div>

  <script src="./vendor/vue.global.prod.min.js"></script>
  <script src="./vendor/element-plus.full.min.js"></script>
  <script src="./vendor/element-plus-zh-cn.min.js"></script>
  <script src="./vendor/axios.min.js"></script>

  <script src="./js/api.js"></script>
  <script src="./js/pages/home.js"></script>
  <script src="./js/pages/chat.js"></script>
  <script src="./js/pages/doodle.js"></script>
  <script src="./js/pages/starmap.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
